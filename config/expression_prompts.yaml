# 每种情绪对应的改图 prompt（给 AI 图像编辑用）
# 原则：只改表情，不改姿势、衣服、背景

base: >
  Same collectible doll figure, same pose, same outfit, same camera angle,
  same lighting, product photography. Only change the facial expression.

prompts:
  happy: "{base} Expression: warm gentle smile, bright eyes."
  sad: "{base} Expression: sad, slightly downcast eyes, subtle melancholy."
  waiting: "{base} Expression: patient waiting look, soft gaze, calm anticipation."
  angry: "{base} Expression: slightly angry, furrowed brow, firm look."
  shy: "{base} Expression: shy, averted gaze, slight blush, timid."
  surprised: "{base} Expression: surprised, widened eyes, slightly open mouth."
  neutral: "{base} Expression: calm neutral face, relaxed."
  loving: "{base} Expression: loving tender smile, warm soft eyes."
  tired: "{base} Expression: tired, heavy eyelids, weary but gentle."
